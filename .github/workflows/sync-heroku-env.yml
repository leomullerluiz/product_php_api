name: Sync Heroku Env

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync-env:
    name: Sync env vars to Heroku
    runs-on: ubuntu-latest

    env:
      HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
      HEROKU_APP_NAME: ${{ vars.HEROKU_APP_NAME || 'product-php-api' }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DB_CONNECTION: pgsql
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_PORT: ${{ secrets.DB_PORT }}
      DB_DATABASE: ${{ secrets.DB_DATABASE }}
      DB_USERNAME: ${{ secrets.DB_USERNAME }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_SSLMODE: ${{ vars.DB_SSLMODE || 'require' }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      JWT_TTL_SECONDS: ${{ vars.JWT_TTL_SECONDS || '3600' }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

    steps:
      - name: Validate required values
        shell: bash
        run: |
          set -euo pipefail

          missing=0

          for name in \
            HEROKU_API_KEY \
            HEROKU_APP_NAME \
            DATABASE_URL \
            DB_HOST \
            DB_PORT \
            DB_DATABASE \
            DB_USERNAME \
            DB_PASSWORD \
            JWT_SECRET \
            SENTRY_DSN
          do
            if [ -z "${!name}" ]; then
              echo "::error::${name} is not configured in GitHub Actions secrets or variables."
              missing=1
            fi
          done

          exit "$missing"

      - name: Install Heroku CLI
        shell: bash
        run: |
          set -euo pipefail
          curl https://cli-assets.heroku.com/install.sh | sh

      - name: Set Heroku config vars
        shell: bash
        run: |
          set -euo pipefail

          heroku config:set \
            DATABASE_URL="$DATABASE_URL" \
            DB_CONNECTION="$DB_CONNECTION" \
            DB_HOST="$DB_HOST" \
            DB_PORT="$DB_PORT" \
            DB_DATABASE="$DB_DATABASE" \
            DB_USERNAME="$DB_USERNAME" \
            DB_PASSWORD="$DB_PASSWORD" \
            DB_SSLMODE="$DB_SSLMODE" \
            JWT_SECRET="$JWT_SECRET" \
            JWT_TTL_SECONDS="$JWT_TTL_SECONDS" \
            SENTRY_DSN="$SENTRY_DSN" \
            --app "$HEROKU_APP_NAME" \
            >/dev/null

          echo "Heroku config vars synced for app ${HEROKU_APP_NAME}."
