services:
  app:
    container_name: product_php_api_app
    build:
      context: .
    ports:
      - "8080:80"
    environment:
      DATABASE_URL: "postgres://product_php_api:product_php_api@db:5432/product_php_api_db"
      DB_CONNECTION: "pgsql"
      DB_HOST: "db"
      DB_PORT: "5432"
      DB_DATABASE: "product_php_api_db"
      DB_USERNAME: "product_php_api"
      DB_PASSWORD: "product_php_api"
      DB_SSLMODE: "disable"
      JWT_SECRET: "local-development-jwt-secret-change-me-32"
      JWT_TTL_SECONDS: "3600"
      CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:8080"
      SENTRY_DSN: "${SENTRY_DSN:-}"
    depends_on:
      migrate:
        condition: service_completed_successfully

  migrate:
    container_name: product_php_api_migrate
    image: postgres:16-alpine
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: "product_php_api"
    volumes:
      - ./migrations:/migrations:ro
    command: >
      sh -c 'for file in /migrations/*.sql; do
        echo "Applying $$file";
        psql -h db -U product_php_api -d product_php_api_db -v ON_ERROR_STOP=1 -f "$$file";
      done'

  db:
    container_name: product_php_api_db
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: "product_php_api_db"
      POSTGRES_USER: "product_php_api"
      POSTGRES_PASSWORD: "product_php_api"
    volumes:
      - product_php_api_db_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U product_php_api -d product_php_api_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  product_php_api_db_data:
